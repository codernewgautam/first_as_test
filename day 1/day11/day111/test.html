<!DOCTYPE html>
<html>
<head>
<title>Student Job Portal</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* 🔥 NAVBAR FLEXBOX */
header {
    background: #2c3e50;
    color: white;
    padding: 15px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav .menu {
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
}

nav a:hover {
    color: yellow;
}

/* 🔥 CARD GRID */
.jobs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* 🔥 CARD DESIGN */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    transition: 0.3s;
}

/* 🔥 HOVER EFFECT */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px black;
}

/* BUTTON */
button {
    background: #e67e22;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button:hover {
    background: #d35400;
}

/* FORM */
form {
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

/* 🔥 RESPONSIVE */
@media (max-width: 600px) {
    nav {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<header>
    <nav>
        <h2>🎓 Job Portal</h2>
        <div class="menu">
            <a href="#home">Home</a>
            <a href="#login">Login</a>
            <a href="#jobs">Jobs</a>
        </div>
    </nav>
</header>

<!-- HOME -->
<section id="home">
    <h2 style="padding:20px;">Welcome 🚀</h2>
</section>

<!-- LOGIN -->
<section id="login">
<form>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <input type="submit" value="Login">
</form>
</section>

<!-- 🔥 JOB CARDS -->
<section id="jobs" class="jobs">

    <div class="card">
        <h3>Google</h3>
        <p>Software Engineer</p>
        <p>Bangalore</p>
        <button onclick="location.href='#login'">Apply</button>
    </div>

    <div class="card">
        <h3>Amazon</h3>
        <p>Web Developer</p>
        <p>Delhi</p>
        <button onclick="location.href='#login'">Apply</button>
    </div>

    <div class="card">
        <h3>Microsoft</h3>
        <p>Frontend Developer</p>
        <p>Hyderabad</p>
        <button onclick="location.href='#login'">Apply</button>
    </div>

</section>

</body>
</html>
