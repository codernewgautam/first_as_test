<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    
<section id="signup">
    <h2>Signup</h2>
    <form action="login.html">

        Name:
        <input type="text" placeholder="Enter name" required><br><br>

        Email:
        <input type="email" placeholder="Enter email" required><br><br>

        Phone:
        <input type="tel" placeholder="Enter phone"><br><br>

        Password:
        <input type="password" required><br><br>

        Gender:
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female<br><br>

        Skills:
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JS<br><br>

        City:
        <select>
            <option>Select</option>
            <option>Patna</option>
            <option>Delhi</option>
        </select><br><br>

        <input type="submit" value="Signup">

    </form>
</section>

<hr>

</body>
</html>
